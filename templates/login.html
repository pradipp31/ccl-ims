<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCL Internship Portal - Student Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f2f5fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:white;
padding:40px;
width:400px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.15);

}

h2{

text-align:center;
margin-bottom:10px;
color:#003366;

}

p{

text-align:center;
margin-bottom:25px;
color:gray;

}

input{

width:100%;
padding:12px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:14px;
background:#0056b3;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

button:hover{

background:#003d80;

}

</style>

</head>

<body>

<div class="login-box">

<h2>CCL Internship Portal</h2>

<p>Student Login</p>

<form action="application.html">

<input
type="email"
placeholder="Enter Email ID"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
