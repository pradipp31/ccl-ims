<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CCL-IMS Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-head">
      <div class="badge">CCL-IMS</div>
      <h1>Internship Management System</h1>
      <p>Student Login</p>
    </div>

    <div class="login-body">
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="apna.email@test.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">Login</button>
      </form>
    </div>

    <div class="login-footer">
      Test Login: rahul1@test.com / pass123
    </div>
  </div>
</div>

</body>
</html>
