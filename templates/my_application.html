<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internship Application Form</title>

<style>

body{

background:#eef2f7;
font-family:Arial;
padding:30px;

}

.container{

max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);

}

h2{

text-align:center;
color:#003366;
margin-bottom:30px;

}

.section{

margin-bottom:25px;

}

.section h3{

margin-bottom:15px;
color:#0056b3;

}

.row{

display:flex;
gap:20px;
margin-bottom:15px;

}

.row input,
.row select{

flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

textarea{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
height:100px;

}

.file{

margin-bottom:15px;

}

button{

width:100%;
padding:15px;
background:#0056b3;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#003366;

}

</style>

</head>

<body>

<div class="container">

<h2>CCL Internship Application Form</h2>

<form>

<div class="section">

<h3>Personal Details</h3>

<div class="row">

<input type="text" placeholder="Student Name" required>

<input type="email" placeholder="Email ID" required>

</div>

<div class="row">

<input type="tel" placeholder="Phone Number" required>

<input type="date" required>

</div>

<textarea placeholder="Full Address"></textarea>

</div>

<div class="section">

<h3>College Details</h3>

<div class="row">

<input type="text" placeholder="College Name">

<input type="text" placeholder="College Registration ID">

</div>

<div class="row">

<input type="text" placeholder="Branch">

<input type="text" placeholder="Current Year">

</div>

<div class="row">

<input type="number" placeholder="Year of Passing">

<input type="text" placeholder="University">

</div>

</div>

<div class="section">

<h3>Internship Details</h3>

<div class="row">

<select>

<option>Select Internship Interest</option>

<option>Software Development</option>

<option>Frontend Development</option>

<option>Backend Development</option>

<option>Web Development</option>

<option>Artificial Intelligence</option>

<option>Cyber Security</option>

<option>Data Analytics</option>

</select>

<input type="text" placeholder="Preferred Department">

</div>

</div>

<div class="section">

<h3>Upload Documents</h3>

<div class="file">

Resume

<input type="file">

</div>

<div class="file">

Aadhaar Card

<input type="file">

</div>

<div class="file">

College NOC Certificate

<input type="file">

</div>

<div class="file">

College ID Card

<input type="file">

</div>

<div class="file">

Passport Size Photo

<input type="file">

</div>

</div>

<button>

Submit Application

</button>

</form>

</div>

</body>
</html>
